<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SGCRC — Cobros Recurrentes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #080a10; color: #e8eaf0; font-family: system-ui, sans-serif; }
    </style>
  </head>
  <body>
    <div id="root" style="display:grid;place-items:center;min-height:100vh;color:#8b8fa8;">
      <div style="text-align:center;max-width:680px;padding:1rem;">
        <h1 style="margin-bottom:0.6rem;color:#e8eaf0;font-size:1.2rem;">Cargando SGCRC…</h1>
        <p style="line-height:1.5;">Si ves esta pantalla por mucho tiempo, inicia el frontend con <code style="color:#a78bfa">npm run dev</code> dentro de <code style="color:#a78bfa">sgcrc-frontend-export</code>.</p>
      </div>
    </div>
    <script>
      if (location.protocol === 'file:') {
        const root = document.getElementById('root');
        root.innerHTML = `
          <div style="text-align:center;max-width:760px;padding:1rem">
            <h1 style="margin-bottom:0.7rem;color:#fbbf24;font-size:1.25rem">⚠️ No abras index.html directamente</h1>
            <p style="line-height:1.5;color:#c8d0e8">Este frontend necesita ejecutarse con Vite (servidor local), no con <code>file://</code>.</p>
            <pre style="margin-top:1rem;background:#0f1117;border:1px solid #2a2d3a;border-radius:10px;padding:0.8rem;color:#9ad1a5;text-align:left;overflow:auto">cd sgcrc-frontend-export
npm install
npm run dev</pre>
          </div>`;
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
